---
- name: "Setting chromium as default browser"
  shell: 
    freeform: "xdg-settings set default-web-browser chromium-browser.desktop"

- name: "Installing unclutter and xdotools"
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - unclutter
    - xdotools
  notify: Restart lightdm

- name: "Creating X config directories 1"
  file:
    path: /home/pi/.config
    state: directory

- name: "Creating X config directories 2"
  file:
    path: /home/pi/.config/lxsession
    state: directory

- name: "Creating X config directories 3"
  file:
    path: /home/pi/.config/lxsession/LXDE-pi
    state: directory

- name: "Creating LXDE autostart configuration"
  template:
    src: "templates/autostart.j2"
    dest: "/home/{{ autostart_user }}/.config/lxsession/LXDE-pi/autostart"
  notify: Restart lightdm

- name: "Disabling lightdm screensaver"
  lineinfile:
    dest: /etc/lightdm/lightdm.conf
    regexp: "xserver-command="
    line: "xserver-command=X -s 0 -dpms"
    state: present
  notify: Restart lightdm
